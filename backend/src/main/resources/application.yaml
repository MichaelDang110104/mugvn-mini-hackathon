spring:
  application:
    name: backend
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-ada-002
    vectorstore:
      mongodb:
        collection-name: embedded_movies
        index-name: vector_index
        path-name: plot_embedding
        initialize-schema: false
  mongodb:
    uri: ${MONGO_URI}
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  cache:
    type: redis
server:
  port: 9000