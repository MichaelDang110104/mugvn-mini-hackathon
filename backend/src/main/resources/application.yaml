spring:
  application:
    name: backend
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-ada-002
    vectorstore:
      mongodb:
        collection-name: embedded_movies
        index-name: vector_index
        path-name: plot_embedding
        initialize-schema: false
  mongodb:
    uri: ${MONGO_URI}
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  cache:
    type: redis
server:
  port: 9000

recommendation:
  starter-refresh-cron: 0 0 0 * * *
  starter-query:
    llm:
      enabled: ${STARTER_QUERY_LLM_ENABLED:false}
      model: ${STARTER_QUERY_LLM_MODEL:gpt-4o-mini}
      temperature: ${STARTER_QUERY_LLM_TEMPERATURE:0.2}
