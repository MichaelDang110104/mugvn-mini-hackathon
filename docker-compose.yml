services:
  # =============================================
  # MongoDB — document store + vector store
  # =============================================
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================
  # Redis — caching layer
  # =============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # =============================================
  # Spring Boot Backend (Java 21)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/hackathon}
      REDIS_HOST: ${REDIS_HOST:-redis}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================
  # Next.js Frontend
  # =============================================
  frontend:
    build:
      context: ./frontend-hackathon
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://backend.fproject.site}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://backend.fproject.site}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
