services:
  # =============================================
  # Spring Boot Backend (Java 21)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/hackathon}
      REDIS_HOST: ${REDIS_HOST:-redis}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =============================================
  # Next.js Frontend
  # =============================================
  frontend:
    build:
      context: ./frontend-hackathon
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://backend.fproject.site}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://backend.fproject.site}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
