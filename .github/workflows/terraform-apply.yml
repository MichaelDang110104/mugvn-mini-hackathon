name: Terraform Apply (prod)

on:
  push:
    branches:
      - pipeline
    paths:
      - 'infra/terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Terraform init
        run: |
          terraform -chdir=infra/terraform/environments/prod init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="endpoint=${TF_STATE_ENDPOINT}" \
            -backend-config="force_path_style=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true"
        env:
          TF_INPUT: 'false'
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_ENDPOINT: ${{ secrets.TF_STATE_ENDPOINT }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}

      - name: Terraform apply
        run: terraform -chdir=infra/terraform/environments/prod apply -auto-approve
