name: Build & Deploy Hackathon App

on:
  push:
    branches:
      - master

jobs:
  # ──────────────────────────────────────────────
  # Prepare — determine environment & notify start
  # ──────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      docker_tag: ${{ steps.vars.outputs.docker_tag }}
    steps:
      - name: Determine environment
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "docker_tag=latest_prod" >> $GITHUB_OUTPUT
          else
            echo "environment=stag" >> $GITHUB_OUTPUT
            echo "docker_tag=latest_stag" >> $GITHUB_OUTPUT
          fi

      - name: Discord — Deployment Started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: >-
            🚀 ${{ steps.vars.outputs.environment == 'prod'
              && 'PROD: Đang chuẩn bị chạy CICD Backend + Frontend — xin đừng hoảng loạn!!!'
              || 'STAG: Đang chuẩn bị chạy CICD Backend + Frontend — xin đừng hoảng loạn!!!' }}

  # ──────────────────────────────────────────────
  # Build Backend Docker Image (parallel)
  # ──────────────────────────────────────────────
  build-backend:
    name: Build Backend
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/hackathon-backend:${{ needs.prepare.outputs.docker_tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/hackathon-backend:latest

  # ──────────────────────────────────────────────
  # Build Frontend Docker Image (parallel)
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-hackathon
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/hackathon-frontend:${{ needs.prepare.outputs.docker_tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/hackathon-frontend:latest

  # ──────────────────────────────────────────────
  # Deploy to servers
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [prepare, build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      # ── Production Server ──
      - name: Deploy to Production Server
        if: github.ref_name == 'master'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUD_PROD_HOST }}
          username: ${{ secrets.CLOUD_PROD_USERNAME }}
          key: ${{ secrets.CLOUD_PROD_SSH_KEY }}
          port: 22
          script: |
            DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
            TAG="${{ needs.prepare.outputs.docker_tag }}"

            # ── Create shared network (if not exists) ──
            docker network create hackathon-net 2>/dev/null || true

            # ── Backend ──
            docker stop hackathon-backend || true
            docker rm hackathon-backend || true
            docker pull ${DOCKER_USER}/hackathon-backend:${TAG}
            docker run -d \
              --name hackathon-backend \
              --restart unless-stopped \
              --network hackathon-net \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -p 9000:9000 \
              ${DOCKER_USER}/hackathon-backend:${TAG}

            # ── Frontend ──
            docker stop hackathon-frontend || true
            docker rm hackathon-frontend || true
            docker pull ${DOCKER_USER}/hackathon-frontend:${TAG}
            docker run -d \
              --name hackathon-frontend \
              --restart unless-stopped \
              --network hackathon-net \
              -p 3000:3000 \
              ${DOCKER_USER}/hackathon-frontend:${TAG}

            # ── Cleanup ──
            docker image prune -f

      # ── Staging VPS ──
      - name: Deploy to Staging VPS
        if: github.ref_name == 'stag'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
            TAG="${{ needs.prepare.outputs.docker_tag }}"

            # ── Create shared network (if not exists) ──
            docker network create hackathon-net 2>/dev/null || true

            # ── Backend ──
            docker stop hackathon-backend || true
            docker rm hackathon-backend || true
            docker pull ${DOCKER_USER}/hackathon-backend:${TAG}
            docker run -d \
              --name hackathon-backend \
              --restart unless-stopped \
              --network hackathon-net \
              -e MONGO_URI="${{ secrets.MONGO_URI_STAG }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST_STAG }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -p 9000:9000 \
              ${DOCKER_USER}/hackathon-backend:${TAG}

            # ── Frontend ──
            docker stop hackathon-frontend || true
            docker rm hackathon-frontend || true
            docker pull ${DOCKER_USER}/hackathon-frontend:${TAG}
            docker run -d \
              --name hackathon-frontend \
              --restart unless-stopped \
              --network hackathon-net \
              -p 3000:3000 \
              ${DOCKER_USER}/hackathon-frontend:${TAG}

            # ── Cleanup ──
            docker image prune -f

  # ──────────────────────────────────────────────
  # Notify completion (always runs)
  # ──────────────────────────────────────────────
  notify:
    name: Notify
    needs: [prepare, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Discord — Success
        if: needs.deploy.result == 'success'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: >-
            ${{ needs.prepare.outputs.environment == 'prod'
              && '✅ PROD: CICD Backend + Frontend đã xong — vô múc đi bây ❤️'
              || '✅ STAG: CICD Backend + Frontend đã xong — vô múc đi bây ❤️' }}

      - name: Discord — Failure
        if: needs.deploy.result != 'success'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: >-
            ${{ needs.prepare.outputs.environment == 'prod'
              && '❌ PROD: CICD Backend + Frontend bị lỗi — kiểm tra lại nha 😢'
              || '❌ STAG: CICD Backend + Frontend bị lỗi — kiểm tra lại nha 😢' }}
