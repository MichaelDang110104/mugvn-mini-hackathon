name: Terraform Plan (prod)

on:
  pull_request:
    paths:
      - 'infra/terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -recursive -check

      - name: Terraform init
        run: |
          terraform -chdir=infra/terraform/environments/prod init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"
        env:
          TF_INPUT: 'false'
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}

      - name: Terraform validate
        run: terraform -chdir=infra/terraform/environments/prod validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform/environments/prod plan
