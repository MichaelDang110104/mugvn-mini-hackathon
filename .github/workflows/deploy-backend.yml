name: Deploy Backend (ECS)

on:
  push:
    branches:
      - pipeline
    paths:
      - 'backend/**'
      - 'infra/ecs/backend-task-definition.json'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Terraform outputs (prod)
        run: |
          terraform -chdir=infra/terraform/environments/prod init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"
          terraform -chdir=infra/terraform/environments/prod output -json > /tmp/tf-outputs.json
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}

      - name: Export deploy vars
        run: |
          echo "ECS_CLUSTER_NAME=$(jq -r '.ecs_cluster_name.value' /tmp/tf-outputs.json)" >> $GITHUB_ENV
          echo "ECS_BACKEND_SERVICE_NAME=$(jq -r '.backend_service_name.value' /tmp/tf-outputs.json)" >> $GITHUB_ENV

      - name: Build and push backend image
        run: |
          BACKEND_REPO=$(jq -r '.backend_repository_url.value' /tmp/tf-outputs.json)
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${BACKEND_REPO}:${IMAGE_TAG}
          docker build -t ${IMAGE_URI} ./backend
          docker push ${IMAGE_URI}
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      - name: Render backend task definition
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          outs = json.loads(Path('/tmp/tf-outputs.json').read_text())
          def v(key):
            return outs[key]['value']

          tpl = Path('infra/ecs/backend-task-definition.json').read_text()
          tpl = tpl.replace('__EXECUTION_ROLE_ARN__', v('ecs_task_execution_role_arn'))
          tpl = tpl.replace('__TASK_ROLE_ARN__', v('ecs_task_role_arn'))
          tpl = tpl.replace('__BACKEND_IMAGE__', os.environ['IMAGE_URI'])
          tpl = tpl.replace('__MONGO_URI_SECRET_ARN__', v('mongo_uri_secret_arn'))
          tpl = tpl.replace('__OPENAI_API_KEY_SECRET_ARN__', v('openai_api_key_secret_arn'))
          tpl = tpl.replace('__REDIS_HOST_SECRET_ARN__', v('redis_host_secret_arn'))
          tpl = tpl.replace('__BACKEND_LOG_GROUP__', v('backend_log_group'))
          tpl = tpl.replace('__AWS_REGION__', os.environ.get('AWS_REGION', v('aws_region')))

          Path('/tmp/backend-task-def.json').write_text(tpl)
          print('Wrote /tmp/backend-task-def.json')
          PY

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: /tmp/backend-task-def.json
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          service: ${{ env.ECS_BACKEND_SERVICE_NAME }}
          wait-for-service-stability: true
